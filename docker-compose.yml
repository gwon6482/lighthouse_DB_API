services:
  # Lighthouse DB API 애플리케이션
  lighthouse-api:
    build: .
    container_name: lighthouse-db-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://admin:password123@mongo:27017/?authSource=admin
      - JOB_DATA_DB=job_data
      - SURVEY_QUESTIONS_DB=survey_questions
      - SURVEY_DATA_DB=survey_data
    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - lighthouse-network

  # MongoDB 데이터베이스
  mongo:
    image: mongo:6.0
    container_name: lighthouse-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=lighthouse_db
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - lighthouse-network

  # MongoDB 덤프 자동 복원 (최초 1회 실행)
  mongo-restore:
    image: mongo:6.0
    container_name: lighthouse-mongo-restore
    depends_on:
      - mongo
    volumes:
      - ./dump:/dump
    entrypoint: >
      bash -c "
        echo '🔄 MongoDB 복원 대기 중...'
        sleep 10
        if [ -d /dump ] && [ -n \"$$(ls -A /dump 2>/dev/null)\" ]; then
          echo '📦 덤프 파일 발견, 복원 시작...'
          mongorestore --uri='mongodb://admin:password123@mongo:27017/?authSource=admin' --drop /dump
          echo '✅ 덤프 복원 완료!'
        else
          echo '⚠️ 덤프 폴더가 비어있습니다.'
        fi
      "
    networks:
      - lighthouse-network

  # MongoDB Express (선택사항 - 웹 기반 MongoDB 관리 도구)
  mongo-express:
    image: mongo-express:1.0.0
    container_name: lighthouse-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:password123@mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=password123
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - lighthouse-network

volumes:
  mongodb_data:
    driver: local

networks:
  lighthouse-network:
    driver: bridge 